<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WEB予約 - Kendai Bistro</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="img/icon%2016.png" type="image/png" />
  </head>
  <body>
    <header>
      <img src="img/site_logo.png" alt="site_logo" />
      <div class="site_reserve">
        <h3>ご予約はこちらから</h3>
        <h2>TEL:000-0000-0000</h2>
        <a href="reserve.html" target="_blank" rel="noopener noreferrer">Web予約フォーム</a>
      </div>
    </header>
    <main>
      <nav>
        <button class="nav-toggle" id="nav-toggle" aria-label="メニューを開閉する">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <ul class="nav-menu" id="nav-menu">
          <li><a href="index.html">トップ</a></li>
          <li><a href="index.html#main-news">お知らせ</a></li>
          <li><a href="index.html#main-concept">コンセプト</a></li>
          <li><a href="index.html#main-menu">メニュー</a></li>
          <li><a href="index.html#main-takeout">テイクアウト</a></li>
          <li><a href="index.html#main-access">アクセス</a></li>
          <li><a href="reserve.html">Web予約</a></li>
        </ul>
      </nav>

      <section id="reservation-form" style="background-color: #f0ebf8; padding: 40px 10px; border-top: 2px solid #dadce0;">
        <div class="gform-container" style="max-width: 640px; margin: 0 auto;">
          <iframe
            src="https://docs.google.com/forms/d/e/1FAIpQLSdo4YG6BJ8TLFHk03vVdyQhB_6pLc_-SogV2IZUv2yIpi_mFA/viewform?embedded=true"
            width="100%"
            height="1100"
            frameborder="0"
            marginheight="0"
            marginwidth="0"
            style="border: none; border-radius: 8px; box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15); display: block;"
          >読み込んでいます…</iframe>
        </div>
      </section>
    </main>
    <footer>
      <h3>&copy;KendaiBistro.com</h3>
    </footer>

    <script>
      const navToggle = document.getElementById('nav-toggle');
      const navMenu = document.getElementById('nav-menu');

      navToggle.addEventListener('click', () => {
        navToggle.classList.toggle('open');
        navMenu.classList.toggle('open');
      });

      const navLinks = navMenu.querySelectorAll('a');
      navLinks.forEach(link => {
        link.addEventListener('click', () => {
          navToggle.classList.remove('open');
          navMenu.classList.remove('open');
        });
      });
    </script>
  </body>
</html>
